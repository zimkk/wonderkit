name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kit/db build
      - run: pnpm typecheck

  migrate:
    name: Migrate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://wonderkit:wonderkit@localhost:5432/wonderkit
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wonderkit
          POSTGRES_PASSWORD: wonderkit
          POSTGRES_DB: wonderkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kit/db build
      - run: pnpm --filter @kit/db exec prisma migrate deploy
